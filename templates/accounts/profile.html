{% extends 'base.html' %}
{% block title %}Profile — TaskFlow{% endblock %}

{% block content %}
<div class="page-header">
    <h1>My Profile</h1>
</div>

<div class="card" style="max-width:560px;">
    <form method="POST" enctype="multipart/form-data" novalidate>
        {% csrf_token %}

        <div class="form-group">
            <label>First Name</label>
            {{ form.first_name }}
        </div>

        <div class="form-group">
            <label>Last Name</label>
            {{ form.last_name }}
        </div>

        <div class="form-group">
            <label>Email</label>
            {{ form.email }}
        </div>

        <div class="form-group">
            <label>Bio</label>
            {{ form.bio }}
        </div>

        <div class="form-group">
            <label>Avatar</label>
            {% if profile.avatar %}
                <img src="{{ profile.avatar.url }}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;margin-bottom:10px;display:block;">
            {% endif %}
            {{ form.avatar }}
        </div>

        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>
{% endblock %}
