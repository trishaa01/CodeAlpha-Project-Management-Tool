{% extends 'base.html' %}
{% block title %}New Task — TaskFlow{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Create Task</h1>
    <a href="/projects/{{ project.pk }}/" class="btn btn-outline">← Back</a>
</div>

<div class="card" style="max-width:560px;">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Task Title</label>
            <input type="text" name="title" class="form-input" placeholder="e.g. Design landing page" autofocus>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-input" placeholder="Describe the task..."></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Status</label>
                <select name="status" class="form-input">
                    <option value="todo">To Do</option>
                    <option value="in_progress">In Progress</option>
                    <option value="done">Done</option>
                </select>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select name="priority" class="form-input">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" name="due_date" class="form-input">
            </div>
            <div class="form-group">
                <label>Assign To</label>
                <select name="assigned_to" class="form-input">
                    <option value="">Unassigned</option>
                    {% for member in members %}
                    <option value="{{ member.pk }}">{{ member.username }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Create Task</button>
    </form>
</div>
{% endblock %}
