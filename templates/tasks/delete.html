{% extends 'base.html' %}
{% block title %}Delete Task — TaskFlow{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Delete Task</h1>
</div>

<div class="card" style="max-width:480px;">
    <p style="margin-bottom:24px;">
        Are you sure you want to delete <strong>{{ task.title }}</strong>? This cannot be undone.
    </p>
    <form method="POST" style="display:flex;gap:12px;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="/tasks/{{ task.pk }}/" class="btn btn-outline">Cancel</a>
    </form>
</div>
{% endblock %}
